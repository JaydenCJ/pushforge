<svg xmlns="http://www.w3.org/2000/svg" width="780" height="440" viewBox="0 0 780 440" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="780" height="440" rx="10" fill="#0d1117"/>
  <rect width="780" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="390" y="21" fill="#8b949e" text-anchor="middle">pushforge — self-hosted Web Push, end to end</text>

  <text x="24" y="64" fill="#7ee787">$ pushforge keygen --subject mailto:ops@example.test --out vapid.json</text>
  <text x="24" y="84" fill="#c9d1d9">wrote VAPID key pair to vapid.json</text>
  <text x="24" y="104" fill="#c9d1d9">applicationServerKey (give this to the browser):</text>
  <text x="24" y="124" fill="#79c0ff">BIpgaep9x59eSa2ycsIn0tTgb5jdJkjyW0o4mDsoRqHswdrVBESEt3CGSXfsNPW6XIg3IvU_-PhY...</text>

  <text x="24" y="156" fill="#7ee787">$ pushforge add sub.json --tag beta</text>
  <text x="24" y="176" fill="#c9d1d9">added <tspan fill="#d2a8ff">8c73db6bdd30</tspan> tags=[beta] (1 subscription in store)</text>

  <text x="24" y="208" fill="#7ee787">$ pushforge send "Deploy finished: v2.4.1 is live" --vapid vapid.json \</text>
  <text x="24" y="228" fill="#7ee787">    --tag beta --topic deploys --dry-run --out outbox</text>
  <text x="24" y="248" fill="#c9d1d9">[dry-run] <tspan fill="#d2a8ff">8c73db6bdd30</tspan> -&gt; POST https://push.example.test (body 134 bytes, ttl 86400)</text>
  <text x="24" y="268" fill="#c9d1d9">  body -&gt; outbox/8c73db6bdd30.body</text>

  <text x="24" y="300" fill="#7ee787">$ pushforge decrypt outbox/8c73db6bdd30.body</text>
  <text x="24" y="320" fill="#3fb950">Deploy finished: v2.4.1 is live</text>

  <text x="24" y="352" fill="#7ee787">$ pushforge enqueue "Nightly digest ready" --all &amp;&amp; pushforge drain --vapid vapid.json</text>
  <text x="24" y="372" fill="#c9d1d9">enqueued 1 job: job-1</text>
  <text x="24" y="392" fill="#c9d1d9">attempted 1: <tspan fill="#3fb950">1 sent</tspan>, 0 retried, 0 gone, 0 failed</text>

  <text x="24" y="424" fill="#8b949e">RFC 8030 + 8291 + 8292 · zero dependencies · your subscriber list stays yours</text>
</svg>
